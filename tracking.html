<!DOCTYPE html>

<head>

    <title>SITTA - Tracking</title>
    <link rel="stylesheet" href="css/style.css">

<body>
    <header>
        <nav class="navbar">
            <div class="nav-brand">Aplikasi SITTA</div>

    <main class="tracking-container">

        <section id="trackingResult" class="hidden">
            <div class="tracking-header">
                <h3>ROIKA HEPRIDA SITIO</h3>
                <p>18503964874</p>
            </div>
            <div class="tracking-body">
                <h4>Perjalanan Paket</h4>
                <ul class="progress-list">
                    <li>Paket dikirim dari pusat (2025-03-20)</li>
                    <li>Tiba di HUB Sumatera (2025-03-22)</li>
                    <li>Dalam proses pengantaran kurir (2025-03-24)</li>
                </ul>
            </div>
        </section>

    <script src="js/script.js"></script>
